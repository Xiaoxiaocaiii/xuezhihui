# ==========================================
# 学知汇·大学版 后端项目 — 应用配置文件
# Spring Boot 4.0.6 + JDK 17 + MyBatis 3.0.3
# ==========================================

# 应用名称 + 服务端口
spring.application.name=xuezhihui-backend
server.port=8080

# MySQL 数据库连接
spring.datasource.url=jdbc:mysql://localhost:3306/xuezhihui?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath:mybatis/*.xml
mybatis.type-aliases-package=com.xuezhihui.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 文件上传配置（最大100MB）
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# 统一中文编码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# 日志
logging.level.root=INFO
logging.level.com.xuezhihui=DEBUG
