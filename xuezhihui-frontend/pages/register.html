<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 学知汇</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-logo">
            <h1>📚 学知汇</h1>
            <p>大学版 · 学习资源共享平台</p>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label for="reg-username">用户名</label>
                <input type="text" id="reg-username" placeholder="请输入用户名" maxlength="16">
            </div>
            <div class="form-group">
                <label for="reg-password">密码</label>
                <input type="password" id="reg-password" placeholder="请输入密码" maxlength="16" autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-lg btn-block mt-lg" id="reg-submit">注 册</button>
        </form>

        <p style="text-align:center; margin-top: var(--spacing-lg); font-size: var(--font-size-sm); color: var(--color-text-muted);">
            已有账号？<a href="login.html">去登录</a>
        </p>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script>
    var form = document.getElementById('register-form');

    form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var username = document.getElementById('reg-username').value.trim();
        var password = document.getElementById('reg-password').value;

        if (!username) { showToast('请输入用户名', 'error'); return; }
        if (!password) { showToast('请输入密码', 'error'); return; }
        if (username.length < 2) { showToast('用户名至少2位', 'error'); return; }
        if (password.length < 3) { showToast('密码至少3位', 'error'); return; }

        var btn = document.getElementById('reg-submit');
        btn.disabled = true;
        btn.textContent = '注册中...';

        try {
            await register(username, password);
            showToast('注册成功！请登录', 'success');
            setTimeout(function () { window.location.href = 'login.html'; }, 1000);
        } catch (err) {
            showToast(err.message || '注册失败', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '注 册';
        }
    });

    bindEnterSubmit('register-form');
    </script>

</body>
</html>
